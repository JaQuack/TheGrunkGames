name: Trigger homelab Aspire deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_host:
        description: Aspire host to deploy in homelab
        required: true
        default: aspireapp
        type: string
      repo_version:
        description: Git ref to deploy (defaults to the current commit)
        required: false
        default: ''
        type: string
      tags:
        description: Ansible tags to run in homelab
        required: true
        default: compose
        type: string
      full_deploy:
        description: Run the full Proxmox + Aspire deploy shortcut
        required: true
        default: false
        type: boolean

jobs:
  dispatch:
    name: Request and monitor homelab deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_HOST: ${{ inputs.target_host || 'aspireapp' }}
      REPO_VERSION: ${{ inputs.repo_version || github.sha }}
      ANSIBLE_TAGS: ${{ inputs.tags || 'compose' }}
      FULL_DEPLOY: ${{ inputs.full_deploy || false }}
    steps:
      - name: Send repository_dispatch to homelab
        id: dispatch
        env:
          HOMELAB_REPO_DISPATCH_PAT: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${HOMELAB_REPO_DISPATCH_PAT:-}" ]; then
            echo "Missing secret: HOMELAB_REPO_DISPATCH_PAT" >&2
            exit 1
          fi

          dispatch_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "dispatch_time=${dispatch_time}" >> "$GITHUB_OUTPUT"

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMELAB_REPO_DISPATCH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JaQuack/homelab/dispatches \
            -d @- <<JSON
          {
            "event_type": "aspire-deploy",
            "client_payload": {
              "target_host": "${TARGET_HOST}",
              "repo_version": "${REPO_VERSION}",
              "tags": "${ANSIBLE_TAGS}",
              "full_deploy": ${FULL_DEPLOY}
            }
          }
          JSON

          {
            echo "## Homelab deploy requested"
            echo ""
            echo "- Target host: \`${TARGET_HOST}\`"
            echo "- Repo version: \`${REPO_VERSION}\`"
            echo "- Tags: \`${ANSIBLE_TAGS}\`"
            echo "- Full deploy: \`${FULL_DEPLOY}\`"
            echo "- Dispatch time (UTC): \`${dispatch_time}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Locate homelab workflow run
        id: locate
        env:
          HOMELAB_REPO_DISPATCH_PAT: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 24); do
            response="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${HOMELAB_REPO_DISPATCH_PAT}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/JaQuack/homelab/actions/workflows/aspire-deploy.yml/runs?event=repository_dispatch&per_page=10")"

            mapfile -t run_info < <(
              RESPONSE="$response" DISPATCH_TIME="$DISPATCH_TIME" python3 - <<'PY'
import datetime, json, os

data = json.loads(os.environ["RESPONSE"])
dispatch_time = datetime.datetime.fromisoformat(os.environ["DISPATCH_TIME"].replace("Z", "+00:00"))

for run in data.get("workflow_runs", []):
    created_at = run.get("created_at")
    if not created_at:
        continue
    created_dt = datetime.datetime.fromisoformat(created_at.replace("Z", "+00:00"))
    if created_dt >= dispatch_time - datetime.timedelta(seconds=5):
        print(run["id"])
        print(run["html_url"])
        print(run.get("status", "queued"))
        break
PY
            )

            if [ "${#run_info[@]}" -ge 2 ] && [ -n "${run_info[0]:-}" ]; then
              echo "run_id=${run_info[0]}" >> "$GITHUB_OUTPUT"
              echo "run_url=${run_info[1]}" >> "$GITHUB_OUTPUT"
              echo "initial_status=${run_info[2]:-queued}" >> "$GITHUB_OUTPUT"
              echo "Homelab workflow: ${run_info[1]}"
              echo "- Homelab workflow: ${run_info[1]}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "Waiting for homelab workflow to appear (attempt ${attempt}/24)..."
            sleep 5
          done

          echo "Timed out waiting for the homelab workflow run to appear." >&2
          exit 1

      - name: Watch homelab deploy progress
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
          RUN_URL: ${{ steps.locate.outputs.run_url }}
        run: |
          set -euo pipefail
          gh --version
          echo "Watching ${RUN_URL}"
          gh run watch "$RUN_ID" --repo JaQuack/homelab --interval 10 --exit-status

      - name: Show failed homelab logs
        if: ${{ failure() && steps.locate.outputs.run_id != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
        run: |
          gh run view "$RUN_ID" --repo JaQuack/homelab --log-failed || true
