name: Trigger homelab Aspire deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_host:
        description: Aspire host to deploy in homelab
        required: true
        default: aspireapp
        type: string
      repo_version:
        description: Git ref to deploy (defaults to the current commit)
        required: false
        default: ''
        type: string
      tags:
        description: Ansible tags to run in homelab
        required: true
        default: compose
        type: string
      full_deploy:
        description: Run the full Proxmox + Aspire deploy shortcut
        required: true
        default: false
        type: boolean

jobs:
  dispatch:
    name: Request and monitor homelab deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_HOST: ${{ inputs.target_host || 'aspireapp' }}
      REPO_VERSION: ${{ inputs.repo_version || github.sha }}
      ANSIBLE_TAGS: ${{ inputs.tags || 'compose' }}
      FULL_DEPLOY: ${{ inputs.full_deploy || false }}
    steps:
      - name: Verify required tools exist
        shell: bash
        run: |
          set -euo pipefail
          gh --version
          jq --version

      - name: Send repository_dispatch to homelab
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret: HOMELAB_REPO_DISPATCH_PAT" >&2
            exit 1
          fi

          dispatch_epoch="$(date -u +%s)"
          echo "dispatch_epoch=${dispatch_epoch}" >> "$GITHUB_OUTPUT"

          payload="$(jq -n \
            --arg event_type "aspire-deploy" \
            --arg target_host "$TARGET_HOST" \
            --arg repo_version "$REPO_VERSION" \
            --arg tags "$ANSIBLE_TAGS" \
            --arg full_deploy "$FULL_DEPLOY" \
            '{
              event_type: $event_type,
              client_payload: {
                target_host: $target_host,
                repo_version: $repo_version,
                tags: $tags,
                full_deploy: ($full_deploy == "true")
              }
            }')"

          gh api \
            --method POST \
            repos/JaQuack/homelab/dispatches \
            --input - <<< "$payload"

          {
            echo "## Homelab deploy requested"
            echo ""
            echo "- Homelab workflow: https://github.com/JaQuack/homelab/actions/workflows/aspire-deploy.yml"
            echo "- Target host: \`${TARGET_HOST}\`"
            echo "- Repo version: \`${REPO_VERSION}\`"
            echo "- Tags: \`${ANSIBLE_TAGS}\`"
            echo "- Full deploy: \`${FULL_DEPLOY}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Locate homelab workflow run
        id: locate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
          DISPATCH_EPOCH: ${{ steps.dispatch.outputs.dispatch_epoch }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 24); do
            run_json="$(gh run list \
              --repo JaQuack/homelab \
              --workflow aspire-deploy.yml \
              --event repository_dispatch \
              --limit 10 \
              --json databaseId,createdAt,status \
              --jq 'map(select(((.createdAt | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) >= ((env.DISPATCH_EPOCH | tonumber) - 10))))[0]')"

            if [ -n "${run_json}" ] && [ "${run_json}" != "null" ]; then
              run_id="$(jq -r '.databaseId // empty' <<< "$run_json")"
              status="$(jq -r '.status // "queued"' <<< "$run_json")"
              if [ -n "$run_id" ]; then
                run_url="https://github.com/JaQuack/homelab/actions/runs/${run_id}"
                echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
                echo "run_url=${run_url}" >> "$GITHUB_OUTPUT"
                echo "initial_status=${status}" >> "$GITHUB_OUTPUT"
                echo "Homelab workflow run: ${run_url}"
                echo "- Live run: ${run_url}" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi

            echo "Waiting for homelab workflow to appear (attempt ${attempt}/24)..."
            sleep 5
          done

          echo "Timed out waiting for the homelab workflow run to appear." >&2
          exit 1

      - name: Watch homelab deploy progress
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
          RUN_URL: ${{ steps.locate.outputs.run_url }}
        run: |
          set -euo pipefail
          echo "Watching ${RUN_URL}"
          gh run watch "$RUN_ID" --repo JaQuack/homelab --interval 10 --exit-status

      - name: Show failed homelab logs
        if: ${{ failure() && steps.locate.outputs.run_id != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_DISPATCH_PAT }}
          RUN_ID: ${{ steps.locate.outputs.run_id }}
        run: |
          gh run view "$RUN_ID" --repo JaQuack/homelab --log-failed || true
